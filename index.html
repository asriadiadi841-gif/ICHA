<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kancil: Shadow Escape - Visibilitas Optimal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #020205;
            font-family: 'Courier New', Courier, monospace;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }
        canvas {
            background: radial-gradient(circle, #0c121e 0%, #05070a 100%);
            box-shadow: 0 0 60px rgba(239, 68, 68, 0.1);
            border: 1px solid #1a1a1a;
            /* Pastikan seluruh area game 1000x500 masuk ke layar tanpa terpotong */
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
        }
        .ui-overlay {
            position: absolute;
            top: env(safe-area-inset-top, 15px);
            left: env(safe-area-inset-left, 15px);
            color: #ef4444;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 10;
        }
        .bar-container {
            width: 100px;
            height: 5px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            margin-top: 4px;
            overflow: hidden;
        }
        #hp-bar { width: 100%; height: 100%; background: #ef4444; transition: width 0.3s; }

        /* Mobile Controls - Optimized for Visibility */
        #mobile-controls {
            position: absolute;
            bottom: clamp(40px, 12vh, 80px);
            left: 0;
            right: 0;
            padding: 0 env(safe-area-inset-right, 50px) 0 env(safe-area-inset-left, 50px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 50;
        }

        .joystick-container {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
        }
        .joystick-base {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #joystick-stick {
            width: 40px;
            height: 40px;
            background: rgba(239, 68, 68, 0.6);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        .touch-btn {
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.08);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: 900;
            font-size: 12px;
            pointer-events: auto;
            touch-action: none;
            backdrop-filter: blur(5px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.5);
        }
        .touch-btn:active {
            transform: scale(0.9);
            background: rgba(255, 255, 255, 0.2);
        }

        #message-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.98);
            border: 1px solid #ef4444;
            padding: 1.5rem;
            color: white;
            text-align: center;
            display: none;
            z-index: 100;
            width: 70%;
            max-width: 350px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="ui-overlay">
        <div class="flex flex-col gap-1">
            <h1 class="text-sm font-black">SEKTOR <span id="level-display">01</span></h1>
            <div id="difficulty-tag" class="text-[6px] font-bold tracking-[0.2em]">BOOTING...</div>
        </div>
        
        <div class="mt-2 flex flex-col gap-2">
            <div>
                <div class="text-[5px] opacity-70">STRUKTUR</div>
                <div class="bar-container"><div id="hp-bar"></div></div>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="mobile-controls">
        <div class="joystick-container" id="joy-container">
            <div class="joystick-base">
                <div id="joystick-stick"></div>
            </div>
        </div>
        
        <div class="touch-btn" id="btn-jump">LOMPAT</div>
    </div>

    <div id="message-box">
        <h2 id="msg-title" class="text-lg font-black mb-1 text-red-600">GAGAL</h2>
        <p id="msg-text" class="mb-4 opacity-60 text-[7px] tracking-widest uppercase">STRUKTUR RUSAK</p>
        <button id="reset-btn" onclick="resetGame()" class="bg-red-600 text-white font-black py-3 px-6 tracking-[0.3em] uppercase text-[9px] w-full">
            ULANGI
        </button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const levelDisplay = document.getElementById('level-display');
    const diffTag = document.getElementById('difficulty-tag');
    const hpBar = document.getElementById('hp-bar');
    const messageBox = document.getElementById('message-box');

    // Aspek rasio tetap 2:1
    const VIEW_W = 1000;
    const VIEW_H = 500;
    canvas.width = VIEW_W;
    canvas.height = VIEW_H;

    let gameState = 'playing';
    let currentLevel = 1;
    let worldWidth = 4000;
    let levelColor = "#ef4444";
    
    function mulberry32(a) {
        return function() {
            let t = a += 0x6D2B79F5;
            t = Math.imul(t ^ t >>> 15, t | 1);
            t ^= t + Math.imul(t ^ t >>> 7, t | 61);
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        }
    }

    const camera = { x: 0 };
    const player = {
        name: "ALISA",
        x: 100, y: 250, width: 22, height: 32,
        hp: 100, dx: 0, dy: 0,
        speed: 6.5, jumpForce: 13.5, gravity: 0.75,
        grounded: false, facing: 1, invincible: 0
    };

    const keys = {};
    const touchState = { left: false, right: false, jump: false };

    const platforms = [];
    const hazards = [];
    const enemies = [];
    const decor = [];
    let exitPort = { x: 0, y: 0, width: 50, height: 80 };

    const joyContainer = document.getElementById('joy-container');
    const joyStick = document.getElementById('joystick-stick');
    const btnJump = document.getElementById('btn-jump');

    function handleJoystick(e) {
        e.preventDefault();
        const touch = e.touches[0];
        const rect = joyStick.parentElement.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const deltaX = touch.clientX - centerX;
        const limit = 30;
        const moveX = Math.max(-limit, Math.min(limit, deltaX));
        
        joyStick.style.transform = `translate(${moveX}px, 0px)`;
        
        if (moveX < -8) { 
            touchState.left = true; 
            touchState.right = false; 
        } else if (moveX > 8) { 
            touchState.right = true; 
            touchState.left = false; 
        } else {
            touchState.left = false;
            touchState.right = false;
        }
    }

    joyContainer.addEventListener('touchstart', handleJoystick, {passive: false});
    joyContainer.addEventListener('touchmove', handleJoystick, {passive: false});
    joyContainer.addEventListener('touchend', () => {
        touchState.left = false;
        touchState.right = false;
        joyStick.style.transform = `translate(0px, 0px)`;
    });

    btnJump.addEventListener('touchstart', (e) => { e.preventDefault(); touchState.jump = true; });
    btnJump.addEventListener('touchend', () => touchState.jump = false);

    function initLevel(lv) {
        platforms.length = 0;
        hazards.length = 0;
        enemies.length = 0;
        decor.length = 0;
        
        player.x = 100; player.y = 200;
        player.hp = 100; player.invincible = 0;
        player.dx = 0; player.dy = 0;
        camera.x = 0;

        const seededRandom = mulberry32(lv + 888); 
        const difficulties = ["LATIHAN", "STANDAR", "TAKTIKAL", "EKSTRIM", "KRITIS"];
        const dIdx = Math.min(difficulties.length - 1, Math.floor((lv - 1) / 2));
        diffTag.innerText = `STATUS: ${difficulties[dIdx]}`;
        levelDisplay.innerText = lv.toString().padStart(2, '0');
        
        const hues = [0, 210, 280, 45, 160];
        levelColor = `hsl(${hues[lv % hues.length]}, 80%, 50%)`;

        worldWidth = 3000 + (lv * 500);
        exitPort.x = worldWidth - 150;

        // Platform awal di posisi aman tengah (Y=320)
        platforms.push({ x: 0, y: 320, width: 600, height: 180, type: 'start' });

        let nextX = 650; 
        let lastY = 320;

        for(let i=0; i<40; i++) {
            decor.push({
                x: seededRandom() * worldWidth,
                y: seededRandom() * VIEW_H,
                w: 1, h: 30 + seededRandom() * 50,
                speed: 0.1 + seededRandom() * 0.4
            });
        }

        while (nextX < worldWidth - 500) {
            let pWidth = 150 + seededRandom() * 150;
            // Rentang pY diperketat agar lintasan selalu di tengah layar secara vertikal
            let pY = lastY + (seededRandom() * 140 - 70); 
            pY = Math.max(180, Math.min(320, pY)); 

            platforms.push({ x: nextX, y: pY, width: pWidth, height: 20 });

            if (seededRandom() < 0.25) {
                let sW = 20 + seededRandom() * 40;
                hazards.push({ x: nextX + (pWidth-sW)/2, y: pY, w: sW, h: 12 });
            }

            if (seededRandom() < 0.22) {
                enemies.push({
                    x: nextX + 20, y: pY - 20,
                    startX: nextX + 10, endX: nextX + pWidth - 30,
                    speed: 1.3 + (lv * 0.12), dir: 1, w: 18, h: 18
                });
            }

            nextX += pWidth + 90 + seededRandom() * 80;
            lastY = pY;
        }

        platforms.push({ x: worldWidth - 400, y: 320, width: 400, height: 180, type: 'end' });
        exitPort.y = 320 - exitPort.height;
        updateUI();
    }

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function takeDamage(amt) {
        if (player.invincible > 0 || gameState !== 'playing') return;
        player.hp -= amt;
        player.invincible = 60;
        updateUI();
        if (player.hp <= 0) {
            player.hp = 0;
            showMessage("ICAA ICA", "SABAR JANGAN NAPSU " + currentLevel + " HANCURMI");
        }
    }

    function showMessage(title, text) {
        gameState = 'paused';
        document.getElementById('msg-title').innerText = title;
        document.getElementById('msg-text').innerText = text;
        messageBox.style.display = 'block';
    }

    function resetGame() {
        messageBox.style.display = 'none';
        gameState = 'playing';
        initLevel(currentLevel);
    }

    function updateUI() {
        hpBar.style.width = player.hp + '%';
        hpBar.style.backgroundColor = levelColor;
    }

    function update() {
        if (gameState !== 'playing') return;

        if (player.invincible > 0) player.invincible--;

        player.dx = 0;
        if (keys['ArrowRight'] || keys['KeyD'] || touchState.right) { 
            player.dx = player.speed; player.facing = 1; 
        }
        else if (keys['ArrowLeft'] || keys['KeyA'] || touchState.left) { 
            player.dx = -player.speed; player.facing = -1; 
        }

        player.dy += player.gravity;
        if ((keys['ArrowUp'] || keys['Space'] || keys['KeyW'] || touchState.jump) && player.grounded) {
            player.dy = -player.jumpForce;
            player.grounded = false;
        }

        player.x += player.dx;
        player.y += player.dy;

        // Batas bawah jatuhnya player diperketat
        if (player.y > VIEW_H + 20) takeDamage(100);

        player.grounded = false;
        platforms.forEach(p => {
            if (player.x + player.width > p.x && player.x < p.x + p.width) {
                if (player.dy >= 0 && player.y + player.height <= p.y + player.dy + 8 && player.y + player.height >= p.y - 8) {
                    player.y = p.y - player.height;
                    player.dy = 0;
                    player.grounded = true;
                }
            }
        });

        camera.x += (player.x - VIEW_W/2 - camera.x) * 0.12;
        camera.x = Math.max(0, Math.min(worldWidth - VIEW_W, camera.x));

        hazards.forEach(h => {
            if (player.x < h.x + h.w && player.x + player.width > h.x &&
                player.y + player.height > h.y - 8 && player.y < h.y + 8) takeDamage(25);
        });

        enemies.forEach(en => {
            en.x += en.speed * en.dir;
            if (en.x > en.endX || en.x < en.startX) en.dir *= -1;
            if (player.x < en.x + en.w && player.x + player.width > en.x &&
                player.y < en.y + en.h && player.y + player.height > en.y) takeDamage(40);
        });

        if (player.x > exitPort.x && player.y + player.height > exitPort.y) {
            currentLevel++;
            initLevel(currentLevel);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, VIEW_W, VIEW_H);
        ctx.save();
        ctx.translate(-camera.x, 0);

        decor.forEach(d => {
            ctx.fillStyle = "rgba(255, 255, 255, 0.04)";
            ctx.fillRect(d.x - (camera.x * d.speed), d.y, d.w, d.h);
        });

        platforms.forEach(p => {
            ctx.fillStyle = "#05070a";
            ctx.fillRect(p.x, p.y, p.width, p.height);
            ctx.strokeStyle = p.type ? levelColor : "#2a2a2a";
            ctx.lineWidth = 2;
            ctx.strokeRect(p.x, p.y, p.width, p.height);
            
            ctx.fillStyle = levelColor;
            ctx.globalAlpha = 0.15;
            ctx.fillRect(p.x, p.y, p.width, 2);
            ctx.globalAlpha = 1;
        });

        hazards.forEach(h => {
            ctx.fillStyle = "#ef4444";
            for(let i=0; i<h.w; i+=10) {
                ctx.beginPath();
                ctx.moveTo(h.x + i, h.y);
                ctx.lineTo(h.x + i + 5, h.y - h.h);
                ctx.lineTo(h.x + i + 10, h.y);
                ctx.fill();
            }
        });

        enemies.forEach(en => {
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(en.x, en.y, en.w, en.h);
            ctx.fillStyle = "red";
            ctx.fillRect(en.x + (en.dir > 0 ? 12 : 2), en.y + 4, 3, 3);
        });

        ctx.fillStyle = levelColor;
        ctx.shadowBlur = 15;
        ctx.shadowColor = levelColor;
        ctx.fillRect(exitPort.x, exitPort.y, exitPort.width, exitPort.height);
        ctx.shadowBlur = 0;

        if (player.invincible % 6 < 3) {
            ctx.fillStyle = levelColor;
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.fillStyle = "#000";
            ctx.fillRect(player.facing === 1 ? player.x + 14 : player.x + 4, player.y + 6, 4, 4);

            ctx.font = "bold 12px 'Courier New'";
            ctx.textAlign = "center";
            ctx.fillStyle = "#ffffff";
            ctx.fillText(player.name, player.x + player.width/2, player.y - 10);
        }

        ctx.restore();
        if (gameState === 'playing') update();
        requestAnimationFrame(draw);
    }

    initLevel(1);
    draw();
</script>

</body>
</html>
